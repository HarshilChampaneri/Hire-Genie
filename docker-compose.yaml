services:

  #  Tools and Architecture Docker Services:-

  #  ZIPKIN:-
  hire-genie-zipkin:
    image: openzipkin/zipkin:latest
    container_name: hire-genie-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    networks:
      hire-genie-network:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #  MONGODB-SECURITY-SERVICE:-
  security-service-mongo:
    image: mongo:latest
    container_name: security-service-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=pass
      - MONGO_INITDB_DATABASE=security_db
    volumes:
      - security-service-data:/data/db
    networks:
      hire-genie-network:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "-u", "user", "-p", "pass", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  #  POSTGRESQL-RESUME-BUILDER:-
  resume-builder-pg:
    image: postgres:latest
    container_name: resume-builder-pg
    ports:
      - "5421:5432"
    environment:
      - POSTGRES_DB=resume_builder_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    networks:
      hire-genie-network:
    volumes:
      - resume-builder-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "resume_builder_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #  POSTGRESQL-JOB-SERVICE:-
  job-service-pg:
    image: postgres:latest
    container_name: job-service-pg
    ports:
      - "5422:5432"
    environment:
      - POSTGRES_DB=job_service_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    networks:
      hire-genie-network:
    volumes:
      - job-service-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "job_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #  PGVECTOR-JOB-RECOMMENDATION-ENGINE:-
  job-recommendation-engine-pg:
    image: pgvector/pgvector:pg18
    container_name: job-recommendation-engine-pg
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=job_recommendation_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    networks:
      hire-genie-network:
    volumes:
      - job-recommendation-engine-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "job_recommendation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #  PGVECTOR-EMPLOYEE-RECOMMENDATION-ENGINE:-
  employee-recommendation-engine-pg:
    image: pgvector/pgvector:pg18
    container_name: employee-recommendation-engine-pg
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=employee_recommendation_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    networks:
      hire-genie-network:
    volumes:
      - employee-recommendation-engine-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "employee_recommendation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  #  KAFKA:-
  hire-genie-kafka:
    image: apache/kafka:latest
    container_name: hire-genie-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 'hire-genie-cluster-id'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@hire-genie-kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        EXTERNAL://0.0.0.0:9094,
        CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://hire-genie-kafka:9092,
        EXTERNAL://localhost:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 1
    networks:
      hire-genie-network:
    volumes:
      - ./docker/kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  #  KAFKA_UI:-
  hire-genie-kafka-ui:
    container_name: hire-genie-kafka-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8070:8080"
    depends_on:
      hire-genie-kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: hire-genie-kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      hire-genie-network:
    restart: unless-stopped

  #  REDIS:-
  hire-genie-redis:
    container_name: hire-genie-redis
    image: redis:latest
    ports:
      - "6379:6379"
    command: redis-server --requirepass pass --appendonly yes
    volumes:
      - hire-genie-redis-data:/data
    networks:
      hire-genie-network:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  #  Spring Boot Application Docker Services:-

  eureka-discovery-server:
    build:
      context: ./eureka-discovery-server
      dockerfile: Dockerfile
    container_name: eureka-discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hire-genie-network

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=https://github.com/HarshilChampaneri/hire-genie-config-repo
    depends_on:
      eureka-discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hire-genie-network

