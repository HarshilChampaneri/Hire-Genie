spring:

  # AI-Configurations:
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-3-flash-preview
            temperature: 0.7

  # DB-Configurations:
  datasource:
    url: ${POSTGRES_URL_RESUME_BUILDER}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Redis Configurations:
  data:
    redis:
      url: ${REDIS_URL}
      database: 0
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: -1ms

  # Cache Configurations:
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  # Kafka Configurations:
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "appEvent:com.hire_genie.resume_builder.kafkaEvent.JobApplicationEvent,profileEvent:com.hire_genie.resume_builder.kafkaEvent.CandidateProfileEvent"
    consumer:
      group-id: candidate-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "appEvent:com.hire_genie.resume_builder.kafkaEvent.JobApplicationEvent,profileEvent:com.hire_genie.resume_builder.kafkaEvent.CandidateProfileEvent"

app:
  security:
    internal-secret: ${INTERNAL_SECRET}

# Port-Configurations:
server:
  port: 9090

# Feign URL:
services:
  job-recommendation-engine:
    url: http://localhost:9093
  employee-recommendation:
    url: http://localhost:9097

# OpenAPI Configurations:
springdoc:
  api-docs:
    path: /api/resumes/v3/api-docs
  swagger-ui:
    path: /api/resumes/swagger-ui.html
  server-url: http://localhost:8080