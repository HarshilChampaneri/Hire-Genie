spring:
  application:
    name: config-server

#  cloud:
#    config.server.git:
#      uri: https://github.com/HarshilChampaneri/hire-genie-config-repo
#      username: HarshilChampaneri
#      password: ${GITHUB_PERSONAL_ACCESS_TOKEN}
#      default-label: main

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          search-locations: file:///E:/Java Practice Projects/AI-Powered-Candidate-Hiring-Platform/hire-genie/config-server/local-config/

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret-key: ${JWT_SECRET_KEY}

server:
  port: 8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
